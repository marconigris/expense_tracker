name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app
        run: |
          status=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" https://chettiexpenses.streamlit.app/)
          echo "HTTP $status"
          case "$status" in
            200|301|302|307|308) exit 0 ;;
            *) exit 1 ;;
          esac
